name: pokemon_stadium
description: Pokémon Stadium Lite — Flutter client with Clean Architecture.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  socket_io_client: ^3.0.2
  dio: ^5.7.0
  just_audio: ^0.9.42
  shared_preferences: ^2.3.4
  google_fonts: ^6.2.1
  equatable: ^2.0.7
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/bg/
    - assets/audio/
    - assets/misc/
    - assets/pokemon/
    - assets/trainers/
